<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <link rel="stylesheet" href="/exemplos/estilo/style.css">
</head>
<body>
    <table>
        <caption>Alunos</caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Nota</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Aluno</td>
                <td>9.0</td>
            </tr>
            <tr>
                <td>Aluno A</td>
                <td>4.5</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Quantidade de alunos: 2</td>
            </tr>
        </tfoot>
    </table>

    <h3><a href="/inicial.html">Pagina Inicial</a></h3>
</body>
</html>
